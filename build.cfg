#!/bin/bash

# Set the full path to the current build script so it can be unambiguously
# copied to the build directory later.
MYNAME="$(cd "$(dirname "$0")" ; pwd -P )/$(basename $0)"
echo "MYNAME is:  $MYNAME"

# Set this to be the root of your group's installation path

if [ -z "$STAGING" ]; then
